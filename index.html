<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>Game từ vựng 4 kỹ năng - Google Sheet</title>
  <style>
    :root {
      --primary: #3478f6;
      --accent: #ffb703;
      --ok: #18a85b;
      --bad: #e11d48;
      --bg: #eef8ff;
      --card: #fff;
      --text: #172033;
      --muted: #64748b;
      --line: rgba(100, 116, 139, .24);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      /* Đã cập nhật font-family để khắc phục lỗi chữ to chữ nhỏ trong tiếng Việt */
      font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eaf7ff 0%, #f7fbff 48%, #f1f8ee 100%);
    }

    .app {
      width: min(1120px, calc(100% - 24px));
      margin: 0 auto;
      padding: 16px 0 28px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 24px;
      font-weight: 650;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .pill {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 13px;
      border-radius: 999px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 8px 20px rgba(15, 23, 42, .07);
      font-weight: 600;
      white-space: nowrap;
    }

    .hidden {
      display: none !important;
    }

    .home-hero {
      max-width: 720px;
      margin: 0 auto 18px;
      padding: 14px 18px;
      text-align: center;
      border: 3px solid #f59e0b;
      border-radius: 24px;
      background: linear-gradient(180deg, #fffef2 0%, #ffe18a 100%);
      color: #19335c;
      box-shadow: 0 7px 0 #cf7900, 0 18px 34px rgba(185, 109, 0, .18);
    }

    .home-hero h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 34px);
      text-transform: uppercase;
      letter-spacing: .02em;
    }

    .home-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .home-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(158px, 1fr));
      gap: 18px;
    }

    .topic-card {
      position: relative;
      min-height: 230px;
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 10px;
      padding: 14px 12px 12px;
      border: 3px solid #ffc15a;
      border-radius: 20px;
      background: linear-gradient(180deg, #ffffff 0%, #fff7df 100%);
      box-shadow: 0 7px 0 #edae3f, 0 16px 26px rgba(235, 155, 25, .2);
      color: #18304f;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .topic-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 9px 0 #edae3f, 0 18px 30px rgba(235, 155, 25, .24);
    }

    .topic-check {
      position: absolute;
      top: -12px;
      right: -12px;
      width: 34px;
      height: 34px;
      display: none;
      place-items: center;
      border-radius: 999px;
      border: 3px solid #fff;
      background: linear-gradient(180deg, #6ee7a7, #18a85b);
      color: #fff;
      box-shadow: 0 5px 0 #0b7b40;
      font-weight: 700;
    }

    .topic-card.is-complete .topic-check {
      display: grid;
    }

    .topic-img {
      width: 96px;
      height: 82px;
      object-fit: contain;
    }

    .topic-name {
      margin: 0;
      text-align: center;
      font-size: 22px;
      font-weight: 650;
    }

    .topic-status {
      min-height: 40px;
      text-align: center;
      color: #344767;
      font-size: 13px;
      line-height: 1.35;
    }

    .topic-status strong {
      display: block;
      color: #18304f;
      font-weight: 650;
    }

    .topic-status .pending {
      color: #c26a00;
    }

    .topic-status .full {
      color: var(--ok);
    }

    .topic-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: auto;
    }

    .topic-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #d8d0c6;
    }

    .topic-dot.active {
      background: #31c97a;
    }

    .home-button {
      background: linear-gradient(135deg, #27c77b, #55df9d);
      box-shadow: 0 5px 0 #0f8a50;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .panel-head h2 {
      margin: 0;
    }

    .back-home-btn {
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 13px;
      white-space: nowrap;
      box-shadow: 0 4px 0 #0f8a50;
    }

    input, select, button {
      font-family: inherit;
      font-size: 15px;
    }

    input, select {
      min-height: 42px;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      outline: none;
    }

    button {
      min-height: 42px;
      padding: 10px 14px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    button.secondary {
      background: #eaf1ff;
      color: #334155;
    }

    button.accent {
      background: var(--accent);
      color: #1f2937;
    }

    .layout {
      display: grid;
      grid-template-columns: 310px 1fr;
      gap: 14px;
      align-items: start;
    }

    .panel, .game {
      border: 2px solid rgba(52, 120, 246, .28);
      border-radius: 18px;
      box-shadow: 0 18px 38px rgba(43, 98, 160, .16);
      overflow: hidden;
    }

    .panel {
      padding: 14px;
      position: sticky;
      top: 12px;
      background: linear-gradient(180deg, #fff4c7 0%, #dff9ef 48%, #d9efff 100%);
      box-shadow:
        inset 0 0 0 3px rgba(255, 255, 255, .58),
        0 18px 38px rgba(43, 98, 160, .16);
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 650;
    }

    .game {
      background:
        radial-gradient(circle at top right, rgba(255, 204, 72, .58), transparent 34%),
        radial-gradient(circle at bottom left, rgba(80, 190, 255, .34), transparent 34%),
        linear-gradient(180deg, #fff0b8 0%, #dff5ff 56%, #fff1cf 100%);
      box-shadow:
        inset 0 0 0 3px rgba(255, 255, 255, .55),
        0 18px 38px rgba(43, 98, 160, .16);
    }

    label {
      display: block;
      margin: 10px 0 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .skill-tabs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin: 12px 0;
    }

    .skill-tabs button {
      background: #eef6ff;
      color: #334155;
      font-weight: 600;
    }

    .skill-tabs button.active {
      background: linear-gradient(135deg, #3478f6, #6aa7ff);
      color: #fff;
    }

    .word-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      max-height: 320px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .word-chip {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 9px 10px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .72);
      font-weight: 600;
      cursor: pointer;
    }

    .dot {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #cbd5e1;
      color: #fff;
      font-size: 12px;
    }

    .word-chip.done .dot {
      background: var(--ok);
    }

    .word-chip.masked-word span:nth-child(2) {
      color: var(--muted);
      letter-spacing: .02em;
    }

    .progress-wrap {
      padding: 16px 18px 0;
    }

    .progress {
      height: 12px;
      background: #dcecff;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #3478f6, #28c76f, #ffd166);
      transition: width .2s ease;
    }

    .stage {
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .task {
      width: min(640px, 100%);
      min-height: 520px;
      display: grid;
      align-content: start;
      justify-items: center;
      gap: 16px;
      padding: 24px;
      border-radius: 22px;
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 190, 50, .32), transparent 30%),
        radial-gradient(circle at 82% 20%, rgba(65, 180, 255, .32), transparent 32%),
        linear-gradient(180deg, rgba(255,255,255,.92), rgba(232,248,255,.92));
      border: 1px solid rgba(52, 120, 246, .12);
    }

    .mode {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(37, 99, 235, .1);
      color: var(--primary);
      font-weight: 650;
    }

    .question {
      margin: 0;
      text-align: center;
      font-size: 20px;
      font-weight: 600;
    }

    .task-image {
      width: min(240px, 70vw);
      height: min(190px, 48vw);
      position: relative;
      display: grid;
      place-items: center;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #fff;
      overflow: hidden;
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
    }

    .task-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
    }

    .task-image.read-mode {
      cursor: pointer;
      border: 2px solid rgba(37, 99, 235, .45);
      box-shadow: 0 10px 28px rgba(37, 99, 235, .14);
    }

    .task-image.read-mode:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
    }

    .task-image.masked,
    .task-image.masked:hover {
      transform: none;
    }

    .task-image.is-spinning {
      border-color: var(--accent);
      box-shadow: 0 14px 34px rgba(245, 158, 11, .24);
    }

    .task-image.is-spinning img {
      animation: imageSlide .14s linear infinite;
    }

    .task-image.masked img {
      animation: none;
      transform: none;
    }

    .spin-hint {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 8px;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, .72);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      pointer-events: none;
    }

    .image-mask {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      z-index: 2;
      border-radius: 14px;
      background: linear-gradient(135deg, #1d4ed8, #60a5fa);
      color: #fff;
      font-size: 48px;
      font-weight: 650;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, .55);
    }

    .task-image.masked .image-mask {
      display: grid;
      animation: none;
      transform: none;
    }

    @keyframes imageSlide {
      0% { transform: translateY(-72%) scale(.92); opacity: .2; }
      45% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(72%) scale(.92); opacity: .2; }
    }

    .word-display {
      min-width: min(360px, 92%);
      padding: 12px 18px;
      text-align: center;
      border: 2px dashed var(--primary);
      border-radius: 14px;
      background: #fff;
      font-size: 30px;
      font-weight: 650;
      line-height: 1.15;
    }

    .word-display.has-replay {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
    }

    .replay-word-btn {
      border: 0;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 9px 12px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(37, 99, 235, .18);
    }

    .replay-word-btn:hover {
      filter: brightness(.96);
    }

    .word-display.revealed {
      border-style: solid;
      border-color: var(--ok);
      background: #f0fdf4;
      color: #14532d;
    }

    .meaning {
      margin-top: -8px;
      color: var(--muted);
      font-weight: 600;
      text-align: center;
    }

    .choices {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .choice {
      min-height: 58px;
      padding: 12px;
      border-radius: 14px;
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: 0 7px 16px rgba(15, 23, 42, .06);
    }

    .choice.correct { background: #dcfce7; border-color: var(--ok); }
    .choice.wrong { background: #ffe4e6; border-color: var(--bad); }

    .answer-row {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .feedback {
      min-height: 28px;
      text-align: center;
      font-weight: 600;
    }

    .feedback.good { color: var(--ok); }
    .feedback.bad { color: var(--bad); }

    .status {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .error {
      color: var(--bad);
    }

    @media (max-width: 820px) {
      .app {
        width: 100%;
        padding: 6px 6px 14px;
      }

      .topbar {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
      }

      .topbar > div:first-child {
        display: none;
      }

      h1 {
        font-size: 20px;
      }

      .pill {
        width: auto;
        min-height: 30px;
        justify-content: center;
        padding: 5px 11px;
        font-size: 14px;
        box-shadow: 0 5px 14px rgba(15, 23, 42, .07);
      }

      .layout {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: stretch;
      }

      .game,
      .panel {
        width: 100%;
        max-width: 100%;
      }

      /* Trên điện thoại: ưu tiên khung học chính lên trước */
      .game {
        order: 1;
        border-radius: 16px;
      }

      /* Khung chọn bài đưa xuống dưới và thu gọn */
      .panel {
        order: 2;
        position: static;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 8px;
        padding: 10px;
        border-radius: 14px;
      }

      .panel-head {
        grid-column: 1 / -1;
        margin: 0;
      }

      .panel-head h2 {
        font-size: 14px;
      }

      .back-home-btn {
        min-height: 30px;
        padding: 5px 10px;
        font-size: 12px;
      }

      .status,
      .word-list,
      label {
        display: none;
      }

      #topicSelect,
      #lessonSelect {
        min-height: 36px;
        padding: 6px 9px;
        border-radius: 10px;
        font-size: 14px;
      }

      .skill-tabs {
        grid-column: 1 / -1;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        margin: 0;
      }

      .skill-tabs button {
        min-height: 34px;
        padding: 6px 4px;
        border-radius: 10px;
        font-size: 14px;
      }

      .progress-wrap {
        padding: 8px 12px 0;
      }

      .progress {
        height: 8px;
      }

      .stage {
        width: 100%;
        padding: 8px;
      }

      .task {
        width: 100%;
        min-height: calc(100svh - 72px);
        gap: 10px;
        padding: 14px 10px;
        border-radius: 18px;
        align-content: center;
        justify-items: center;
      }

      .mode {
        padding: 6px 10px;
        font-size: 14px;
      }

      .question {
        font-size: 18px;
        line-height: 1.32;
      }

      .task-image {
        width: min(220px, 76vw);
        height: min(170px, 48vw);
      }

      .spin-hint {
        bottom: 7px;
        font-size: 11px;
        padding: 5px 7px;
      }

      .word-display {
        min-width: min(300px, 96%);
        padding: 9px 11px;
        font-size: 24px;
        line-height: 1.16;
      }

      .word-display.has-replay {
        gap: 8px;
      }

      .replay-word-btn {
        min-height: 34px;
        padding: 7px 10px;
        font-size: 13px;
      }

      .meaning {
        margin-top: -4px;
        font-size: 14px;
        line-height: 1.32;
      }

      #answerArea {
        width: 100%;
        display: grid;
        place-items: center;
      }

      .choices {
        width: min(300px, 100%);
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .choice {
        min-height: 50px;
        padding: 9px;
        border-radius: 13px;
      }

      .answer-row {
        width: min(320px, 100%);
        grid-template-columns: 1fr;
      }

      .feedback {
        min-height: 22px;
        font-size: 14px;
      }

      .home-hero {
        margin-bottom: 12px;
        padding: 12px;
        border-radius: 18px;
      }

      .home-hero h1 {
        font-size: 22px;
      }

      .home-actions {
        margin-bottom: 14px;
      }

      .home-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .topic-card {
        min-height: 190px;
        padding: 12px 8px 10px;
        border-radius: 16px;
      }

      .topic-img {
        width: 76px;
        height: 66px;
      }

      .topic-name {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="homeView">
      <div class="home-hero">
        <h1>Từ vựng theo chủ đề</h1>
      </div>
      <div class="home-actions">
        <span class="pill" id="homeStatusText">Đang tải dữ liệu...</span>
      </div>
      <div class="home-grid" id="topicCards"></div>
    </section>

    <section id="lessonView" class="hidden">
      <div class="topbar">
        <div>
          <h1>Game từ vựng 4 kỹ năng</h1>
        </div>
        <div class="pill">Tiến độ: <span id="progressText">0/0</span></div>
      </div>

      <section class="layout">
        <aside class="panel">
          <div class="panel-head">
            <h2>Bài học</h2>
            <button type="button" class="home-button back-home-btn" id="backHomeBtn">Trang chủ</button>
          </div>
          <p class="status" id="statusText">Đang tải dữ liệu từ Google Sheet...</p>

          <label for="topicSelect">Chọn chủ đề</label>
          <select id="topicSelect"></select>

          <label for="lessonSelect">Chọn bài</label>
          <select id="lessonSelect"></select>

          <div class="skill-tabs" aria-label="Chọn kỹ năng">
            <button type="button" class="active" data-mode="read">Đọc</button>
            <button type="button" data-mode="listen">Nghe</button>
            <button type="button" data-mode="write">Viết</button>
            <button type="button" data-mode="speak">Nói</button>
          </div>

          <div class="word-list" id="wordList"></div>
        </aside>

        <section class="game">
          <div class="progress-wrap">
            <div class="progress"><span id="progressBar"></span></div>
          </div>
          <div class="stage">
            <div class="task">
              <div class="mode" id="modeBadge">Kỹ năng: Đọc</div>
              <p class="question" id="questionText"></p>
              <div class="task-image" id="taskImageBox" role="button" tabindex="0">
                <img id="taskImage" alt="Ảnh bài học">
                <div class="image-mask" id="imageMask">?</div>
                <div class="spin-hint" id="spinHint">Bấm ảnh để quay</div>
              </div>
              <div class="word-display" id="wordDisplay"></div>
              <div class="meaning" id="meaningText"></div>
              <div id="answerArea"></div>
              <div class="feedback" id="feedback"></div>
            </div>
          </div>
        </section>
      </section>
    </section>
  </main>

  <script>
    // Gan link Apps Script hoac CSV o day roi upload len web.
    const DATA_SOURCE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT2j3WWLHrhmp__1oHnZYCLKINLHYZzDkbsEsxaPoimD3EmHTlQnCbA3eeKauwNsaIx-deX3KRB5BzY/pub?output=csv";

    const MODE_LABELS = {
      read: "Đọc",
      listen: "Nghe",
      write: "Viết",
      speak: "Nói"
    };

    const MODE_ORDER = ["read", "listen", "write", "speak"];
    const REQUIRED_FOR_COMPLETE = ["read", "listen", "write"];
    const FULL_SKILLS = ["read", "listen", "write", "speak"];
    const LESSON_SKILLS_STORAGE_KEY = "tuvung_chude_lesson_skills";

    const state = {
      topics: [],

    function getLessonSkills(topic = currentTopic(), lesson = currentLesson()) {
      const key = lessonProgressKey(topic.id, lesson.id);
      return Array.isArray(state.lessonSkills[key]) ? state.lessonSkills[key] : [];
    }

    function isLessonCompleted(skills) {
      return REQUIRED_FOR_COMPLETE.every(skill => skills.includes(skill));
    }

    function isLessonFullyCompleted(skills) {
      return FULL_SKILLS.every(skill => skills.includes(skill));
    }

    function getLessonStatusText(skills) {
      const count = FULL_SKILLS.filter(skill => skills.includes(skill)).length;

      if (isLessonFullyCompleted(skills)) {
        return { main: "Đã xong 4/4 kỹ năng", sub: "Hoàn thành đủ", className: "full" };
      }

      if (isLessonCompleted(skills)) {
        return { main: "Đã xong 3/4 kỹ năng", sub: "Còn phần Nói", className: "pending" };
      }

      return { main: `Đã xong ${count}/4 kỹ năng`, sub: "Tiếp tục học", className: "" };
    }

    function getTopicImage(topic) {
      if (topic.img) return topic.img;
      const firstLesson = topic.lessons[0];
      const firstWord = firstLesson && firstLesson.words[0];
      return firstWord && firstWord.img ? firstWord.img : "";
    }

    function getTopicStatus(topic) {
      const totalLessons = topic.lessons.length;
      const completedLessons = topic.lessons.filter(lesson => {
        const skills = getLessonSkills(topic, lesson);
        return isLessonCompleted(skills);
      }).length;
      const fullLessons = topic.lessons.filter(lesson => {
        const skills = getLessonSkills(topic, lesson);
        return isLessonFullyCompleted(skills);
      }).length;
      const speakingPendingLessons = topic.lessons.filter(lesson => {
        const skills = getLessonSkills(topic, lesson);
        return isLessonCompleted(skills) && !skills.includes("speak");
      }).length;

      if (totalLessons === 1) {
        return getLessonStatusText(getLessonSkills(topic, topic.lessons[0]));
      }

      if (completedLessons === totalLessons && fullLessons === totalLessons) {
        return { main: `Đã xong ${totalLessons}/${totalLessons} bài`, sub: "Hoàn thành đủ", className: "full" };
      }

      if (completedLessons === totalLessons && speakingPendingLessons > 0) {
        return { main: `Đã xong ${completedLessons}/${totalLessons} bài`, sub: `${speakingPendingLessons} bài còn phần Nói`, className: "pending" };
      }

      return { main: `Đã xong ${completedLessons}/${totalLessons} bài`, sub: "Tiếp tục học", className: "" };
    }

    function normalizeText(text) {
      return String(text || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9 ]/g, "")
        .trim();
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i++;
          row.push(cell);
          if (row.some(value => value.trim() !== "")) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      row.push(cell);
      if (row.some(value => value.trim() !== "")) rows.push(row);
      return rows;
    }

    function csvToObjects(text) {
      const rows = parseCsv(text);
      if (rows.length < 2) return [];
      const headers = rows[0].map(header => header.trim());

      return rows.slice(1).map(row => {
        const item = {};
        headers.forEach((header, index) => {
          item[header] = (row[index] || "").trim();
        });
        return item;
      });
    }

    function rowsToLessons(rows) {
      const map = new Map();

      rows.forEach(row => {
        const lessonId = row.MaBai || row.LessonId || row.lesson || row.id;
        const word = row.TuVung || row.Word || row.word;
        if (!lessonId || !word) return;

        if (!map.has(lessonId)) {
          map.set(lessonId, {
            id: lessonId,
            title: row.TenBai || row.Title || lessonId,
            words: []
          });
        }

        map.get(lessonId).words.push({
          word,
          vi: row.Nghia || row.Meaning || row.vi || "",
          ipa: row.IPA || row.Ipa || row.ipa || "",
          img: row.Anh || row.Image || row.img || "",
          order: Number(row.ThuTu || row.Order || 999)
        });
      });

      return [...map.values()].map(lesson => ({
        ...lesson,
        words: lesson.words.sort((a, b) => a.order - b.order)
      })).filter(lesson => lesson.words.length > 0);
    }

    function rowsToTopics(rows) {
      const hasTopic = rows.some(row => row.MaChuDe || row.TenChuDe || row.TopicId || row.Topic);

      if (!hasTopic) {
        return [{
          id: "default",
          title: "Tất cả chủ đề",
          lessons: rowsToLessons(rows)
        }];
      }

      const topicMap = new Map();

      rows.forEach(row => {
        const topicId = row.MaChuDe || row.TopicId || row.Topic || "default";
        const lessonId = row.MaBai || row.LessonId || row.lesson || row.id;
        const word = row.TuVung || row.Word || row.word;
        if (!lessonId || !word) return;

        if (!topicMap.has(topicId)) {
          topicMap.set(topicId, {
            id: topicId,
            title: row.TenChuDe || row.TopicTitle || row.TopicName || topicId,
            img: row.AnhChuDe || row.TopicImage || row.TopicImg || "",
            lessonMap: new Map()
          });
        }

        const topic = topicMap.get(topicId);
        const topicImage = row.AnhChuDe || row.TopicImage || row.TopicImg || "";
        if (!topic.img && topicImage) {
          topic.img = topicImage;
        }

        if (!topic.lessonMap.has(lessonId)) {
          topic.lessonMap.set(lessonId, {
            id: lessonId,
            title: row.TenBai || row.Title || lessonId,
            words: []
          });
        }

        topic.lessonMap.get(lessonId).words.push({
          word,
          vi: row.Nghia || row.Meaning || row.vi || "",
          ipa: row.IPA || row.Ipa || row.ipa || "",
          img: row.Anh || row.Image || row.img || "",
          order: Number(row.ThuTu || row.Order || 999)
        });
      });

      return [...topicMap.values()].map(topic => ({
        id: topic.id,
        title: topic.title,
        img: topic.img,
        lessons: [...topic.lessonMap.values()].map(lesson => ({
          ...lesson,
          words: lesson.words.sort((a, b) => a.order - b.order)
        })).filter(lesson => lesson.words.length > 0)
      })).filter(topic => topic.lessons.length > 0);
    }

    function normalizeSheetUrl(url) {
      const cleanUrl = url.trim();
      if (!cleanUrl) return "";

      if (cleanUrl.includes("/pubhtml")) {
        const normalized = cleanUrl.replace("/pubhtml", "/pub");
        const separator = normalized.includes("?") ? "&" : "?";
        return normalized.includes("output=csv") ? normalized : `${normalized}${separator}output=csv`;
      }

      if (cleanUrl.includes("/edit")) {
        const idMatch = cleanUrl.match(/\/spreadsheets\/d\/([^/]+)/);
        const gidMatch = cleanUrl.match(/[?&]gid=([^&#]+)/);
        if (idMatch) {
          const gid = gidMatch ? gidMatch[1] : "0";
          return `https://docs.google.com/spreadsheets/d/${idMatch[1]}/export?format=csv&gid=${gid}`;
        }
      }

      return cleanUrl;
    }

    async function loadFromUrl(url) {
      const cleanUrl = normalizeSheetUrl(url);
      if (!cleanUrl) throw new Error("Chưa có link Google Sheet.");

      const res = await fetch(cleanUrl, { cache: "no-store" });
      if (!res.ok) throw new Error("Không tải được dữ liệu Sheet.");

      const text = await res.text();
      const contentType = res.headers.get("content-type") || "";

      if (contentType.includes("application/json") || text.trim().startsWith("{") || text.trim().startsWith("[")) {
        const data = JSON.parse(text);
        if (Array.isArray(data)) return rowsToTopics(data);
        if (data && data.ok === false) throw new Error(data.error || "Apps Script trả về lỗi.");
        if (Array.isArray(data.data)) return rowsToTopics(data.data);
        if (Array.isArray(data.topics)) return data.topics;
        if (Array.isArray(data.lessons)) return lessonsToDefaultTopic(data.lessons);
      }

      return rowsToTopics(csvToObjects(text));
    }

    let synthVoices = [];
    let globalAudioPlayer = null;

    if ("speechSynthesis" in window) {

        synthVoices = window.speechSynthesis.getVoices();
      };

    function speakWordByBrowser(word, lang = "en-US") {
      if (!word) return;
      console.log("[TTS] Đang đọc bằng speechSynthesis:", word);

      if (!("speechSynthesis" in window)) {
        setFeedback("Trình duyệt chưa hỗ trợ đọc âm thanh.", false);
        return;
      }

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = lang;
      utterance.rate = 0.85;

      if (synthVoices.length === 0) {
        synthVoices = window.speechSynthesis.getVoices();
      }

      if (synthVoices.length > 0) {
        let bestVoice = synthVoices.find(v => v.name.includes('Google') && v.lang === lang);
        
        if (!bestVoice) {
          bestVoice = synthVoices.find(v => v.lang === lang) || synthVoices.find(v => v.lang.includes(lang.split('-')[0]));
        }

        if (bestVoice) {
          utterance.voice = bestVoice;
        }
      }

      window.speechSynthesis.speak(utterance);
    }

    function speakWord(word, lang = "en-US") {
      if (!word) return;

      if (globalAudioPlayer) {
        globalAudioPlayer.pause();
        globalAudioPlayer.removeAttribute("src");
        globalAudioPlayer.load();
      }

      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }

      const googleTtsLang = lang === "en-US" ? "en" : lang === "vi-VN" ? "vi" : lang;
      const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(word)}&tl=${googleTtsLang}&client=tw-ob`;
      const audio = new Audio(ttsUrl);
      globalAudioPlayer = audio;
      audio.playbackRate = lang === "vi-VN" ? 1 : 0.85;
      audio.onplaying = () => {
        console.log("[TTS] Đang đọc bằng Google Translate TTS:", word);
      };

      let usedFallback = false;
      const fallbackToBrowserVoice = () => {
        if (usedFallback || globalAudioPlayer !== audio) return;
        usedFallback = true;
        console.log("[TTS] Google TTS lỗi, chuyển sang speechSynthesis:", word);
        speakWordByBrowser(word, lang);
      };

      audio.onerror = fallbackToBrowserVoice;
      audio.play().catch(fallbackToBrowserVoice);
    }

    function shuffle(items) {
      return [...items].sort(() => Math.random() - .5);
    }

    function requiredCount(mode = state.mode) {
      return mode === "write" || mode === "speak" ? 1 : 4;
    }

    function progressKey(mode = state.mode, word = currentWord()) {
      return `${currentTopic().id}:${currentLesson().id}:${mode}:${word.word}`;
    }

    function getProgressCount(mode = state.mode, word = currentWord()) {
      return state.progressCounts.get(progressKey(mode, word)) || 0;
    }

    function setProgressCount(mode, word, value) {
      state.progressCounts.set(progressKey(mode, word), Math.min(value, requiredCount(mode)));
    }

    function modeTotal(mode = state.mode) {
      return currentLesson().words.length * requiredCount(mode);
    }

    function modeDone(mode = state.mode) {
      return currentLesson().words.reduce((sum, word) => sum + getProgressCount(mode, word), 0);
    }

    function isModeComplete(mode = state.mode) {
      return modeDone(mode) >= modeTotal(mode);
    }

    function nextMode(mode = state.mode) {
      const index = MODE_ORDER.indexOf(mode);
      return MODE_ORDER[index + 1] || "";
    }

    function nextIncompleteWordIndex(mode = state.mode) {
      const needed = requiredCount(mode);
      return currentLesson().words.findIndex(word => getProgressCount(mode, word) < needed);
    }

    function chooseSpinTargetIndex(mode = state.mode) {
      const words = currentLesson().words;
      const needed = requiredCount(mode);
      const candidates = words
        .map((word, index) => ({ word, index }))
        .filter(item => getProgressCount(mode, item.word) < needed);
      if (!candidates.length) return Math.floor(Math.random() * words.length);
      return candidates[Math.floor(Math.random() * candidates.length)].index;
    }

    function setFeedback(message, good) {
      els.feedback.textContent = message;
      els.feedback.className = `feedback ${good ? "good" : "bad"}`;
    }

    function switchMode(mode) {
      state.mode = mode;
      state.spinRevealed = false;
      const nextWord = nextIncompleteWordIndex(mode);
      state.wordIndex = nextWord >= 0 ? nextWord : 0;
      renderTask();
    }

    function handleModeComplete() {
      if (!isModeComplete()) return false;

      const currentLabel = MODE_LABELS[state.mode];
      markLessonSkillComplete(state.mode);
      const next = nextMode();
      if (!next) {
        setFeedback(`Hoàn thành tất cả kỹ năng của bài này!`, true);
        return true;
      }

      setFeedback(`Hoàn thành phần ${currentLabel}. Chuyển sang phần ${MODE_LABELS[next]}...`, true);
      window.clearTimeout(state.autoAdvanceTimer);
      state.autoAdvanceTimer = window.setTimeout(() => switchMode(next), 1300);
      return true;
    }

    function markDone() {
      const count = getProgressCount();
      if (count < requiredCount()) setProgressCount(state.mode, currentWord(), count + 1);
      updateProgress();
      renderWordList();
      return handleModeComplete();
    }

    function checkAnswer(value) {
      const ok = normalizeText(value) === normalizeText(currentWord().word);
      if (ok) {
        const completedMode = markDone();
        if (!completedMode) {
          setFeedback(state.mode === "listen" ? "Chính xác! Bấm ảnh để nghe lượt tiếp theo." : "Chính xác!", true);
          if (state.mode === "listen") state.spinRevealed = false;
        }
        if (state.mode === "write" && !isModeComplete("write")) {
          const nextWord = nextIncompleteWordIndex("write");
          window.setTimeout(() => {
            if (state.mode !== "write" || nextWord < 0) return;
            state.wordIndex = nextWord;
            renderTask();
            setFeedback("Đúng rồi. Viết tiếp từ sau.", true);
          }, 450);
        }
      } else {
        setFeedback(`Chưa đúng. Đáp án: ${currentWord().word}`, false);
      }
      return ok;
    }

    function renderChoices() {
      els.answerArea.innerHTML = `<div class="choices"></div>`;
      const box = els.answerArea.querySelector(".choices");
      shuffle(currentLesson().words).forEach(item => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice";
        button.textContent = item.word;
        button.onclick = () => {
          const ok = item.word === currentWord().word;
          button.classList.add(ok ? "correct" : "wrong");
          checkAnswer(item.word);
          [...box.children].forEach(child => {
            child.disabled = true;
            if (child.textContent === currentWord().word) child.classList.add("correct");
          });
        };
        box.appendChild(button);
      });
    }

    function isSpinMode(mode = state.mode) {
      return mode === "read" || mode === "listen" || mode === "speak";
    }

    function bindSpinButton() {
      const button = document.getElementById("spinBtn");
      if (button) button.onclick = startSpinForCurrentMode;
    }

    function renderSpinMode() {
      const mode = state.mode;
      const word = currentWord();
      els.taskImageBox.classList.add("read-mode");
      els.spinHint.style.display = state.spinRevealed ? "none" : "block";
      els.spinHint.textContent = mode === "listen" ? "Bấm ảnh để nghe" : "Bấm ảnh để quay";

      if (!state.spinRevealed) {
        if (mode === "listen") els.taskImageBox.classList.add("masked");
        const startText = mode === "listen" ? "Bắt đầu nghe" : mode === "speak" ? "Bắt đầu nói" : "Bắt đầu quay";
        const guideText = {
          read: "Bấm vào khung ảnh để quay từ vựng.",
          listen: "Bấm vào khung ảnh để quay, sau đó nghe và chọn đúng từ.",
          speak: "Bấm vào khung ảnh để quay, sau đó đọc từ vừa hiện."
        };
        const displayText = {
          read: "Bấm ảnh để quay",
          listen: "Bấm ảnh để nghe",
          speak: "Bấm ảnh để nói"
        };
        els.questionText.textContent = guideText[mode];
        els.wordDisplay.textContent = displayText[mode];
        els.wordDisplay.classList.remove("revealed");
        els.meaningText.textContent = "Ảnh sẽ chạy qua các từ trong bài rồi dừng ngẫu nhiên.";
        els.answerArea.innerHTML = `<button id="spinBtn" class="accent" type="button">${startText}</button>`;
        bindSpinButton();
        return;
      }

      if (mode === "read") {
        els.questionText.textContent = "Hãy nhấn vào ảnh để học tiếp.";
        renderWordWithReplay(word.word);
        els.wordDisplay.classList.add("revealed");
        els.meaningText.textContent = [word.vi, word.ipa].filter(Boolean).join(" • ");
        els.answerArea.innerHTML = `<button id="spinBtn" class="accent" type="button">Quay từ khác</button>`;
        bindSpinButton();
        return;
      }

      if (mode === "listen") {
        els.taskImageBox.classList.add("masked");
        els.questionText.textContent = "Nghe âm thanh và chọn đúng từ tiếng Anh.";
        els.wordDisplay.textContent = "🔊 Nghe và chọn đáp án";
        els.meaningText.textContent = "Ảnh đã được che. Em hãy nghe rồi chọn 1 trong 4 từ.";
        renderChoices();
        window.setTimeout(() => speakWord(word.word), 250);
        return;
      }

      if (mode === "speak") {
        els.questionText.textContent = "Ảnh đã dừng. Bấm micro và đọc từ tiếng Anh.";
        els.wordDisplay.textContent = `${word.word} ${word.ipa || ""}`;
        els.wordDisplay.classList.add("revealed");
        els.meaningText.textContent = word.vi || "";
        renderSpeak();
      }
    }

    function startSpinForCurrentMode() {
      if (!isSpinMode() || state.isSpinning) return;

      const words = currentLesson().words;
      if (!words.length) return;

      playSpinSound();

      state.isSpinning = true;
      state.spinRevealed = false;
      els.taskImageBox.classList.add("is-spinning");
      els.taskImageBox.classList.remove("masked");
      els.wordDisplay.classList.remove("revealed");
      els.wordDisplay.textContent = "Đang quay...";
      els.meaningText.textContent = "Chờ ảnh dừng lại...";
      els.answerArea.innerHTML = "";
      els.feedback.textContent = "";
      els.feedback.className = "feedback";
      els.spinHint.style.display = "none";

      let step = 0;
      const targetIndex = chooseSpinTargetIndex(state.mode);
      const spinTimer = window.setInterval(() => {
        const item = words[step % words.length];
        setImage(els.taskImage, item.img, item.word);
        step += 1;
      }, 90);

      window.setTimeout(() => {
        window.clearInterval(spinTimer);
        state.wordIndex = targetIndex;
        state.isSpinning = false;
        state.spinRevealed = true;
        els.taskImageBox.classList.remove("is-spinning");
        setImage(els.taskImage, currentWord().img, currentWord().word);
        renderTask();
        if (state.mode === "read") {
          speakWord(currentWord().word, "en-US");
          const completedMode = markDone();
          if (!completedMode) setFeedback("Đã mở từ vựng. Em hãy đọc theo từ và nghĩa.", true);
        } else if (state.mode === "listen") {
          setFeedback("Hãy nghe âm thanh rồi chọn đáp án.", true);
        } else if (state.mode === "speak") {
          setFeedback("Hãy bấm micro và đọc từ này.", true);
        }
      }, 1450);
    }

    function renderInput() {
      els.answerArea.innerHTML = `
        <div class="answer-row">
          <input id="answerInput" type="text" placeholder="Gõ từ tiếng Anh..." autocomplete="off">
          <button id="checkBtn" type="button">Kiểm tra</button>
        </div>
      `;
      const input = document.getElementById("answerInput");
      const button = document.getElementById("checkBtn");
      const submit = () => checkAnswer(input.value);
      button.onclick = submit;
      input.onkeydown = event => {
        if (event.key === "Enter") submit();
      };
      setTimeout(() => input.focus(), 80);
    }

    async function startSpeechCheck() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        setFeedback("Trình duyệt chưa hỗ trợ nhận giọng nói. Hãy dùng Chrome hoặc Edge trên HTTPS.", false);
        return;
      }

      if (location.protocol !== "https:" && location.hostname !== "localhost") {
        setFeedback("Micro chỉ hoạt động trên HTTPS. Hãy mở trang bằng link https://...", false);
        return;
      }

      if (navigator.permissions && navigator.permissions.query) {
        try {
          const permission = await navigator.permissions.query({ name: "microphone" });
          if (permission.state === "denied") {
            setFeedback("Micro đang bị chặn. Bấm biểu tượng micro/ổ khóa trên thanh địa chỉ và chọn Cho phép.", false);
            return;
          }
        } catch (err) {
          // Một số trình duyệt chưa hỗ trợ query quyền microphone.
        }
      }

      const recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.maxAlternatives = 3;
      setFeedback("Đang nghe...", true);

      recognition.onresult = event => {
        const results = Array.from(event.results[0]).map(item => item.transcript);
        const target = normalizeText(currentWord().word);
        const matched = results.some(text => normalizeText(text).includes(target));
        if (matched) {
          const completedMode = markDone();
          if (!completedMode) {
            setFeedback(`Nghe được: ${results[0]}. Đúng! Bấm ảnh để nói lượt tiếp theo.`, true);
            state.spinRevealed = false;
            renderTask();
            setFeedback(`Nghe được: ${results[0]}. Đúng! Bấm ảnh để nói lượt tiếp theo.`, true);
          }
        } else {
          setFeedback(`Nghe được: ${results[0]}. Hãy thử lại.`, false);
        }
      };

      recognition.onerror = event => {
        const messages = {
          "not-allowed": "Micro đang bị chặn. Bấm biểu tượng micro/ổ khóa trên thanh địa chỉ và chọn Cho phép.",
          "service-not-allowed": "Dịch vụ nhận giọng nói đang bị chặn. Hãy dùng Chrome/Edge và cho phép micro.",
          "audio-capture": "Không tìm thấy micro. Hãy kiểm tra micro của máy hoặc tai nghe.",
          "no-speech": "Chưa nghe thấy giọng nói. Hãy bấm lại và đọc rõ từ tiếng Anh.",
          "network": "Lỗi mạng khi nhận giọng nói. Hãy kiểm tra kết nối rồi thử lại."
        };
        setFeedback(messages[event.error] || `Không nhận được giọng nói (${event.error || "unknown"}). Hãy thử lại.`, false);
      };

      recognition.onnomatch = () => {
        setFeedback("Chưa khớp với từ cần đọc. Hãy bấm lại và đọc rõ hơn.", false);
      };

      try {
        recognition.start();
      } catch (err) {
        setFeedback("Không khởi động được micro. Hãy tải lại trang và cho phép quyền micro.", false);
      }
    }

    function renderSpeak() {
      els.answerArea.innerHTML = `<button id="micBtn" type="button">🎙️ Bắt đầu nói</button>`;
      document.getElementById("micBtn").onclick = startSpeechCheck;
    }

    function renderWordList() {
      els.wordList.innerHTML = "";
      const needed = requiredCount();
      currentLesson().words.forEach((item, index) => {
        const doneCount = getProgressCount(state.mode, item);
        const hideWord = state.mode === "write";
        const wordLabel = hideWord ? `Từ ${index + 1}` : item.word;
        const row = document.createElement("div");
        row.className = `word-chip ${hideWord ? "masked-word" : ""} ${doneCount >= needed ? "done" : ""}`;
        row.innerHTML = `
          <span class="dot">${doneCount >= needed ? "✓" : doneCount}</span>
          <span>${wordLabel}</span>
          <small>${doneCount}/${needed}</small>
        `;
        row.onclick = () => {
          state.wordIndex = index;
          state.spinRevealed = false;
          renderTask();
        };
        els.wordList.appendChild(row);
      });
    }

    function updateProgress() {
      const total = modeTotal();
      const done = modeDone();
      els.progressText.textContent = `${done}/${total}`;
      els.progressBar.style.width = total ? `${Math.round(done / total * 100)}%` : "0%";
    }

    function renderTask() {
      const word = currentWord();
      if (!word.word) return;

      els.feedback.textContent = "";
      els.feedback.className = "feedback";
      els.modeBadge.textContent = `Kỹ năng: ${MODE_LABELS[state.mode]}`;
      setImage(els.taskImage, word.img);
      els.taskImageBox.classList.remove("read-mode", "is-spinning", "masked");
      els.wordDisplay.classList.remove("revealed", "has-replay");
      els.spinHint.style.display = "none";
      els.meaningText.textContent = word.vi || "";

      document.querySelectorAll(".skill-tabs button").forEach(button => {
        button.classList.toggle("active", button.dataset.mode === state.mode);
      });

      if (isSpinMode()) {
        renderSpinMode();
      }

      if (state.mode === "write") {
        els.questionText.textContent = "Nhìn ảnh/nghĩa và viết lại từ tiếng Anh.";
        els.wordDisplay.textContent = String(word.word).replace(/[a-z]/gi, "_ ");
        renderInput();
      }

      renderWordList();
      updateProgress();
    }

    function nextTask() {
      state.spinRevealed = false;
      const next = nextMode();
      if (next) {
        state.mode = next;
      } else {
        state.mode = MODE_ORDER[0];
        state.wordIndex = (state.wordIndex + 1) % currentLesson().words.length;
      }
      renderTask();
    }

    function resetCurrentLesson() {
      const prefix = `${currentTopic().id}:${currentLesson().id}:`;
      [...state.progressCounts.keys()].forEach(key => {
        if (key.startsWith(prefix)) state.progressCounts.delete(key);
      });
      window.clearTimeout(state.autoAdvanceTimer);
      state.wordIndex = 0;
      state.mode = "read";
      state.spinRevealed = false;
      renderTask();
    }

    els.backHomeBtn.onclick = showHomeView;

    document.querySelectorAll(".skill-tabs button").forEach(button => {
      button.onclick = () => {
        window.clearTimeout(state.autoAdvanceTimer);
        switchMode(button.dataset.mode);
      };
    });

    els.topicSelect.onchange = () => {
      state.topicIndex = Number(els.topicSelect.value);
      state.lessonIndex = 0;
      state.wordIndex = 0;
      state.mode = "read";
      state.spinRevealed = false;
      state.progressCounts.clear();
      window.clearTimeout(state.autoAdvanceTimer);
      renderLessonSelect();
      renderTask();
      renderTopicCards();
    };

    els.lessonSelect.onchange = () => {
      state.lessonIndex = Number(els.lessonSelect.value);
      state.wordIndex = 0;
      state.mode = "read";
      state.spinRevealed = false;
      state.progressCounts.clear();
      window.clearTimeout(state.autoAdvanceTimer);
      renderTask();
      renderTopicCards();
    };

    els.taskImageBox.onclick = startSpinForCurrentMode;
    els.taskImageBox.onkeydown = event => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        startSpinForCurrentMode();
      }
    };

    els.wordDisplay.onclick = () => {
      if (state.mode === "read" && state.spinRevealed && !state.isSpinning) {
        handleSoundClick();
      }
    };

    async function bootFromDataSource() {
      setStatus("Đang tải dữ liệu...");
      try {
        const topics = await loadFromUrl(DATA_SOURCE_URL);
        const lessonCount = topics.reduce((sum, topic) => sum + topic.lessons.length, 0);
        if (!lessonCount) throw new Error("Sheet không có dữ liệu hợp lệ.");
        setTopics(topics, `Tất cả có ${topics.length} chủ đề`);
      } catch (err) {
        setStatus(err.message + " Hãy kiểm tra lại link DATA_SOURCE_URL hoặc quyền triển khai Apps Script.", true);
      }
    }

    window.applyTuvungChuDeFirebaseProgress = function(progressData) {
      if (!progressData || !progressData.lessonsProgress) return;
      state.lessonSkills = progressData.lessonsProgress;
      saveLessonSkills();
      renderTopicCards();
      if (!els.lessonView.classList.contains("hidden")) renderTask();
    };

    bootFromDataSource();
  </script>
  <script>
    /*
      Firebase progress is intentionally disabled for GitHub Pages testing.
      The app still saves progress in localStorage on this browser.

      Later, replace this no-op function with the Firebase module that writes to:
      users_progress_tuvung_chude/{username}
    */
    window.saveTuvungChuDeSkillToFirebase = async function() {
      return;
    };
  </script>
</body>
</html>
